<!DOCTYPE html><html><head><title>F9 | Gravity Grid</title><script src='https://cdn.tailwindcss.com'></script><script src='https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js'></script><style>body{background:#000;overflow:hidden;}</style></head><body><div class='absolute p-8 gold uppercase text-[10px] tracking-widest'>F9 // Gravity Grid: Click to Pulse</div><script>const { Engine, Render, Runner, Bodies, Composite, Events } = Matter; const engine = Engine.create(); engine.world.gravity.y = 0; const render = Render.create({ element: document.body, engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' } }); const dots = []; for(let i=0; i<200; i++) { dots.push(Bodies.circle(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 3, { frictionAir: 0.05, render: { fillStyle: '#d4af37' } })); } Composite.add(engine.world, dots); window.addEventListener('mousedown', e => { dots.forEach(dot => { const dx = dot.position.x - e.clientX; const dy = dot.position.y - e.clientY; const dist = Math.sqrt(dx*dx + dy*dy); const force = 0.5 / dist; Matter.Body.applyForce(dot, dot.position, { x: dx * force, y: dy * force }); }); }); Render.run(render); Runner.run(Runner.create(), engine);</script></body></html>
