<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Funtaztic 9 | Global Footwear</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .gold-accent { color: #d4af37; }
        .border-gold { border-color: #d4af37; }
        .tab-active { color: #d4af37; border-bottom: 2px solid #d4af37; }
        .hidden { display: none; }
    </style>
</head>
<body class='min-h-screen flex flex-col'>
    <nav class='p-8 flex justify-between items-center border-b border-zinc-900'>
        <div class='text-2xl font-bold tracking-tighter gold-accent' style='font-family: "Playfair Display";'>F9</div>
        <div class='flex gap-8 text-xs uppercase tracking-widest'>
            <button onclick="showTab('collections')" id='btn-collections' class='tab-btn tab-active pb-2'>Collections</button>
            <button onclick="showTab('about')" id='btn-about' class='tab-btn pb-2 hover:text-white transition-colors'>Our Story</button>
            <button onclick="showTab('contact')" id='btn-contact' class='tab-btn pb-2 hover:text-white transition-colors'>Contact</button>
        </div>
        <select id='currencySelector' class='bg-black border border-zinc-700 text-xs p-2 rounded focus:outline-none focus:border-gold-accent'>
            <option value='USD'>USD ($)</option>
            <option value='GBP'>GBP (£)</option>
            <option value='INR'>INR (₹)</option>
            <option value='PHP'>PHP (₱)</option>
            <option value='JPY'>JPY (¥)</option>
        </select>
    </nav>

    <main class='flex-grow max-w-7xl mx-auto px-6 py-12 w-full'>
        
        <section id='tab-collections' class='tab-content'>
            <h2 class='text-5xl font-bold mb-12 tracking-tighter uppercase text-center' style='font-family: "Playfair Display";'>The Collection</h2>
            <div class='grid grid-cols-1 md:grid-cols-3 gap-8' id='productGrid'></div>
        </section>

        
        <section id='tab-about' class='tab-content hidden max-w-2xl mx-auto text-center'>
            <h2 class='text-5xl font-bold mb-8 uppercase' style='font-family: "Playfair Display";'>House of the Rising Sun</h2>
            <p class='text-zinc-400 leading-relaxed mb-6'>Funtaztic 9 was born at the intersection of desert dust and city neon. We don't just sell footwear; we provide the gear for the long road ahead.</p>
            <p class='italic gold-accent uppercase text-sm tracking-widest'>Est. 2026 | Soulful Design</p>
        </section>

        
        <section id='tab-contact' class='tab-content hidden max-w-xl mx-auto border border-zinc-800 p-8'>
            <h2 class='text-3xl font-bold mb-6 gold-accent uppercase'>Reach Out</h2>
            <div class='space-y-4'>
                <input type='text' placeholder='NAME' class='w-full bg-zinc-900 border border-zinc-800 p-3 text-sm focus:border-gold-accent outline-none'>
                <input type='email' placeholder='EMAIL' class='w-full bg-zinc-900 border border-zinc-800 p-3 text-sm focus:border-gold-accent outline-none'>
                <textarea placeholder='MESSAGE' rows='4' class='w-full bg-zinc-900 border border-zinc-800 p-3 text-sm focus:border-gold-accent outline-none'></textarea>
                <button class='w-full py-3 bg-zinc-100 text-black font-bold uppercase text-xs tracking-widest hover:bg-gold-accent transition-colors'>Send Inquiry</button>
            </div>
        </section>
    </main>

    <script>
        const rates = { USD: 1, GBP: 0.78, INR: 82.9, PHP: 55.8, JPY: 150.2 };
        const products = [
            { name: 'Phoenix Blaze', basePrice: 180, img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff', cat: 'Sneaker' },
            { name: 'Desert Nomad', basePrice: 95, img: 'https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77', cat: 'Sandal' },
            { name: 'Neon Spectre', basePrice: 220, img: 'https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a', cat: 'Sneaker' }
        ];

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.getElementById('btn-' + tabName).classList.add('tab-active');
        }

        function renderProducts() {
            const curr = document.getElementById('currencySelector').value;
            const symbol = curr === 'USD' ? '$' : curr === 'GBP' ? '£' : curr === 'INR' ? '₹' : curr === 'PHP' ? '₱' : '¥';
            document.getElementById('productGrid').innerHTML = products.map(p => `
                <div class='bg-zinc-900/30 border border-zinc-900 p-4'>
                    <img src='${p.img}' class='w-full h-72 object-cover mb-4 grayscale hover:grayscale-0 transition-all'>
                    <div class='flex justify-between font-bold'>
                        <span>${p.name}</span>
                        <span class='gold-accent'>${symbol}${(p.basePrice * rates[curr]).toFixed(0)}</span>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('currencySelector').addEventListener('change', renderProducts);
        renderProducts();
    </script>
</body>
</html>
