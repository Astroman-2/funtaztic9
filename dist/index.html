<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Funtaztic 9 | Dynamic Concept Store</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;600&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .gold-accent { color: #d4af37; }
        .ticker { background: #d4af37; color: #000; font-weight: 800; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; padding: 4px 0; overflow: hidden; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .hidden { display: none; }
        .tab-active { color: #d4af37; border-bottom: 2px solid #d4af37; }
    </style>
</head>
<body class='min-h-screen flex flex-col'>
    <div class='ticker'><div class='ticker-text' id='salesTicker'></div></div>

    <nav class='p-8 flex justify-between items-center border-b border-zinc-900'>
        <div class='text-2xl font-bold gold-accent' style='font-family: "Playfair Display";'>F9</div>
        <div class='flex gap-8 text-xs uppercase tracking-widest'>
            <button onclick="showTab('store')" id='btn-store' class='tab-btn tab-active pb-1'>The Object</button>
            <button onclick="showTab('about')" id='btn-about' class='tab-btn pb-1'>The Soul</button>
        </div>
    </nav>

    <main class='flex-grow max-w-7xl mx-auto px-6 py-12 w-full'>
        <section id='tab-store'>
            <div class='text-center mb-16'>
                <h1 id='catTitle' class='text-6xl font-bold uppercase tracking-tighter mb-2 opacity-20' style='font-family: "Playfair Display";'>...</h1>
            </div>
            <div id='productBox' class='max-w-md mx-auto bg-zinc-900/20 border border-zinc-800 p-8'>
                <img id='prodImg' src='' class='w-full h-80 object-cover mb-8 grayscale hover:grayscale-0 transition-all duration-700'>
                <div class='flex justify-between items-end'>
                    <div>
                        <p id='prodCat' class='text-[10px] gold-accent uppercase tracking-widest mb-1'></p>
                        <h3 id='prodName' class='text-3xl font-bold'></h3>
                    </div>
                    <span id='prodPrice' class='text-2xl font-light opacity-50'></span>
                </div>
            </div>
            <div class='text-center mt-12'>
                <button onclick='location.reload()' class='text-[10px] tracking-[0.3em] border border-zinc-800 px-8 py-3 hover:bg-white hover:text-black transition-all'>RE-MANIFEST</button>
            </div>
        </section>

        <section id='tab-about' class='hidden max-w-2xl mx-auto text-center'>
            <h2 id='storyTitle' class='text-4xl font-bold mb-8 uppercase' style='font-family: "Playfair Display";'></h2>
            <div class='mb-12 p-8 border border-zinc-800 bg-zinc-900/40'>
                <p class='text-[10px] tracking-[0.3em] uppercase mb-4 opacity-40'>Ambient Accompaniment</p>
                <audio id='mainAudio' controls class='mx-auto opacity-30 hover:opacity-100 transition-opacity invert w-full'></audio>
            </div>
            <p id='storyText' class='text-zinc-400 leading-relaxed text-lg serif italic'></p>
        </section>
    </main>

    <script>
        const productLib = [
            { name: 'Sunset Aura Lamp', cat: 'Lighting', price: 45, img: 'https://images.unsplash.com/photo-1534073828943-f801091bb18c', story: 'Capturing the final glow of a desert dusk.', audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
            { name: 'Zenith Tech Stand', cat: 'Office', price: 30, img: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8', story: 'Structural integrity meeting digital fluidity.', audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
            { name: 'Bhairavi Sneaker', cat: 'Footwear', price: 180, img: 'https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a', story: 'Walking to the rhythm of the morning raga.', audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' },
            { name: 'Sitar Case 2.0', cat: 'Accessories', price: 120, img: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17', story: 'Protection for the vibrations of the soul.', audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3' },
            { name: 'Neon Bonsai', cat: 'Decor', price: 65, img: 'https://images.unsplash.com/photo-1512428813834-c702c7702b78', story: 'Nature, reimagined for the cyberpunk age.', audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3' }
            // Logic allows for 50+ entries here
        ];

        function render() {
            const item = productLib[Math.floor(Math.random() * productLib.length)];
            
            // Tab 1: Store
            document.getElementById('catTitle').innerText = item.cat;
            document.getElementById('prodImg').src = item.img;
            document.getElementById('prodName').innerText = item.name;
            document.getElementById('prodCat').innerText = item.cat;
            document.getElementById('prodPrice').innerText = '$' + item.price;

            // Tab 2: Story/Audio
            document.getElementById('storyTitle').innerText = item.name + ' Origins';
            document.getElementById('storyText').innerText = item.story;
            document.getElementById('mainAudio').src = item.audio;

            // Ticker
            const locations = ['Dubai', 'New Delhi', 'San Francisco', 'Tokyo', 'London'];
            const loc = locations[Math.floor(Math.random() * locations.length)];
            document.getElementById('salesTicker').innerText = `GLOBAL SALE: ${item.name} dispatched to ${loc} • TRANSACTION VERIFIED • SHIPPING VIA F9 LOGISTICS • `;
        }

        function showTab(t) {
            document.getElementById('tab-store').classList.toggle('hidden', t !== 'store');
            document.getElementById('tab-about').classList.toggle('hidden', t !== 'about');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + t).classList.add('tab-active');
        }

        render();
    </script>
</body>
</html>
