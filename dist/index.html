<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Funtaztic 9 | Dynamic Concept Store</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;600&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .gold-accent { color: #d4af37; }
        .ticker { background: #d4af37; color: #000; font-weight: 800; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; padding: 4px 0; overflow: hidden; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .hidden { display: none; }
        .tab-active { color: #d4af37; border-bottom: 2px solid #d4af37; }
    </style>
</head>
<body class='min-h-screen flex flex-col'>
    <div class='ticker'><div class='ticker-text'>© VIJAY FUNTAZTIC9 • GLOBAL DISPATCH ACTIVE • TRANSACTION SECURE • © VIJAY FUNTAZTIC9</div></div>

    <nav class='p-8 flex justify-between items-center border-b border-zinc-900'>
        <div class='text-2xl font-bold gold-accent' style='font-family: "Playfair Display";'>F9</div>
        <div class='flex gap-8 text-xs uppercase tracking-widest'>
            <button onclick="showTab('store')" id='btn-store' class='tab-btn tab-active pb-1'>The Object</button>
            <button onclick="showTab('cart')" id='btn-cart' class='tab-btn pb-1'>Cart (<span id='cartCount'>0</span>)</button>
            <button onclick="showTab('contact')" id='btn-contact' class='tab-btn pb-1'>Contact</button>
        </div>
    </nav>

    <main class='flex-grow max-w-7xl mx-auto px-6 py-12 w-full'>
        <section id='tab-store'>
            <div id='productBox' class='max-w-md mx-auto bg-zinc-900/20 border border-zinc-800 p-8 text-center'>
                <h1 id='prodCat' class='text-[10px] gold-accent uppercase tracking-[0.5em] mb-4'></h1>
                <img id='prodImg' src='' class='w-full h-96 object-cover mb-8 grayscale hover:grayscale-0 transition-all duration-1000'>
                <h3 id='prodName' class='text-4xl font-bold mb-2' style='font-family: "Playfair Display";'></h3>
                <p id='prodPrice' class='text-xl opacity-50 mb-8'></p>
                <button onclick='addToCart()' class='w-full py-4 bg-white text-black font-bold uppercase text-xs tracking-widest hover:bg-gold-accent transition-colors'>Add to Collection</button>
                <button onclick='location.reload()' class='mt-4 text-[9px] uppercase opacity-30 hover:opacity-100'>Re-Manifest New Object</button>
            </div>
        </section>

        <section id='tab-cart' class='hidden max-w-xl mx-auto text-center'>
            <h2 class='text-4xl font-bold mb-8 uppercase gold-accent'>Your Collection</h2>
            <div id='cartItems' class='space-y-4 mb-8 text-left'></div>
            <button onclick="window.location.href='mailto:vijay9blr@gmail.com?subject=Order Inquiry from Funtaztic9'" class='w-full py-4 border border-gold gold-accent uppercase text-xs font-bold'>Proceed to Inquiry</button>
        </section>

        <section id='tab-contact' class='hidden max-w-xl mx-auto border border-zinc-800 p-8'>
            <h2 class='text-3xl font-bold mb-6 gold-accent uppercase'>Contact Vijay</h2>
            <form action='mailto:vijay9blr@gmail.com' method='post' enctype='text/plain' class='space-y-4'>
                <input type='text' name='name' placeholder='NAME' class='w-full bg-zinc-900 border border-zinc-800 p-3 text-sm outline-none'>
                <textarea name='message' placeholder='MESSAGE' rows='4' class='w-full bg-zinc-900 border border-zinc-800 p-3 text-sm outline-none'></textarea>
                <button type='submit' class='w-full py-3 bg-zinc-100 text-black font-bold uppercase text-xs'>Send Email</button>
            </form>
        </section>
    </main>

    <footer class='p-8 text-[10px] text-center opacity-30 border-t border-zinc-900 uppercase tracking-widest'>
        © Copyright Vijay Funtaztic9. All Rights Reserved.
    </footer>

    <script>
        const items = ['Ergonomic Chair', 'Mechanical Keyboard', 'Sunset Lamp', 'Leather Boots', 'Minimalist Watch', 'Wireless Headphones', 'Bamboo Planter', 'Ceramic Vase'];
        let currentItem = {};
        let cart = [];

        function init() {
            const name = items[Math.floor(Math.random() * items.length)];
            const price = (Math.random() * (500 - 20) + 20).toFixed(2);
            currentItem = { name, price, img: `https://source.unsplash.com/featured/?${name.replace(' ', ',')}` };
            
            document.getElementById('prodName').innerText = currentItem.name;
            document.getElementById('prodCat').innerText = 'F9 SELECTION';
            document.getElementById('prodPrice').innerText = '$' + currentItem.price;
            document.getElementById('prodImg').src = currentItem.img;
        }

        function addToCart() {
            cart.push(currentItem);
            document.getElementById('cartCount').innerText = cart.length;
            renderCart();
            showTab('cart');
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if(cart.length === 0) container.innerHTML = '<p class="text-center opacity-30">Empty</p>';
            else container.innerHTML = cart.map(i => `<div class='flex justify-between border-b border-zinc-800 pb-2'><span>${i.name}</span><span class='gold-accent'>$${i.price}</span></div>`).join('');
        }

        function showTab(t) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + t).classList.add('tab-active');
        }

        init();
    </script>
</body>
</html>
