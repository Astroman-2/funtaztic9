<!DOCTYPE html><html><head><title>F9 | Breakout</title><script src='https://cdn.tailwindcss.com'></script><script src='https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js'></script><style>body{background:#050505;overflow:hidden;}</style></head><body><div class='p-4 text-white text-[10px] uppercase tracking-widest gold'>F9 // Artifact Breakout</div><script>const { Engine, Render, Runner, Bodies, Composite } = Matter; const engine = Engine.create(); const render = Render.create({ element: document.body, engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' } }); const paddle = Bodies.rectangle(window.innerWidth/2, window.innerHeight-50, 120, 20, { isStatic: true, render: { fillStyle: '#fff' } }); const ball = Bodies.circle(window.innerWidth/2, window.innerHeight-100, 10, { friction: 0, restitution: 1.1, frictionAir: 0, render: { fillStyle: '#d4af37' } }); const wallL = Bodies.rectangle(-10, window.innerHeight/2, 20, window.innerHeight, { isStatic: true }); const wallR = Bodies.rectangle(window.innerWidth+10, window.innerHeight/2, 20, window.innerHeight, { isStatic: true }); const roof = Bodies.rectangle(window.innerWidth/2, -10, window.innerWidth, 20, { isStatic: true }); const blocks = []; for(let i=0; i<8; i++) { for(let j=0; j<15; j++) { blocks.push(Bodies.rectangle(100 + (j*80), 100 + (i*30), 70, 20, { render: { fillStyle: '#d4af37' } })); } } Composite.add(engine.world, [paddle, ball, wallL, wallR, roof, ...blocks]); window.addEventListener('mousemove', e => Matter.Body.setPosition(paddle, { x: e.clientX, y: window.innerHeight-50 })); Render.run(render); Runner.run(Runner.create(), engine); Matter.Body.setVelocity(ball, { x: 5, y: -7 });</script></body></html>
