<!DOCTYPE html><html><head><script src='https://cdn.tailwindcss.com'></script><style>body{background:#000; color:white; min-h-screen; display:flex; align-items:center; justify-content:center; background-size:cover; background-position:center;}</style></head><body><div id='loader' class='text-2xl font-mono animate-pulse text-emerald-400'>SEQUENCING GENOMES...</div><div id='content' class='hidden max-w-2xl p-10 bg-emerald-950/30 backdrop-blur-3xl rounded-3xl border border-emerald-500/20 shadow-2xl'><h1 id='word' class='text-6xl font-black mb-4 capitalize text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400'></h1><p id='meaning' class='text-xl italic text-gray-200 mb-6'></p><div id='usage' class='text-gray-400 border-t border-emerald-500/10 pt-6 mb-8'></div><div class='flex gap-4'><a href='../index.html' class='text-xs uppercase tracking-widest hover:text-emerald-400'>← Hub</a><button onclick='navigator.clipboard.writeText(window.location.href);alert("Link Copied!")' class='text-xs uppercase tracking-widest text-emerald-500 hover:text-white'>Share Discovery</button></div></div><script>async function init(){try{const wordRes=await fetch('https://random-word-api.herokuapp.com/word');const [word]=await wordRes.json();const dictRes=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);const data=await dictRes.json();document.body.style.backgroundImage=`url("https://picsum.photos/1920/1080?nature,cells,${word}")`;document.getElementById('word').innerText=word;if(data[0]){const mean=data[0].meanings[0].definitions[0];document.getElementById('meaning').innerText=mean.definition;if(mean.example){document.getElementById('usage').innerHTML=`<p class='bg-emerald-900/20 p-4 rounded-lg'>"${mean.example}"</p>`;}}else{document.getElementById('meaning').innerText='A biological anomaly discovered in the data stream.';}document.getElementById('loader').classList.add('hidden');document.getElementById('content').classList.remove('hidden');}catch(e){console.error(e);}}init();</script></body></html>
