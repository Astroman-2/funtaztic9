<!DOCTYPE html><html><head><script src='https://cdn.tailwindcss.com'></script><style>body{background:#000; color:white; min-h-screen; display:flex; align-items:center; justify-content:center; background-size:cover; background-position:center;}</style></head><body><div id='loader' class='text-2xl font-mono animate-pulse text-purple-500'>UPLOADING CONSCIOUSNESS...</div><div id='content' class='hidden max-w-2xl p-10 bg-purple-950/40 backdrop-blur-3xl rounded-3xl border border-purple-500/30 shadow-[0_0_50px_rgba(168,85,247,0.2)]'><h1 id='word' class='text-6xl font-black mb-4 capitalize text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-fuchsia-500'></h1><p id='meaning' class='text-xl italic text-gray-200 mb-6'></p><div id='usage' class='text-gray-400 border-t border-purple-500/20 pt-6'></div><a href='../index.html' class='inline-block mt-8 text-xs uppercase tracking-[0.3em] hover:text-purple-400'>← Return to Grid</a></div><script>async function init(){try{const wordRes=await fetch('https://random-word-api.herokuapp.com/word');const [word]=await wordRes.json();const dictRes=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);const data=await dictRes.json();document.body.style.backgroundImage=`url("https://picsum.photos/1920/1080?neon,city,${word}")`;document.getElementById('word').innerText=word;if(data[0]){const mean=data[0].meanings[0].definitions[0];document.getElementById('meaning').innerText=mean.definition;if(mean.example){document.getElementById('usage').innerHTML=`<p class='bg-purple-900/20 p-4 rounded-lg border border-purple-500/10'>"${mean.example}"</p>`;}}else{document.getElementById('meaning').innerText='A ghost in the machine; a word without a formal record.';}document.getElementById('loader').classList.add('hidden');document.getElementById('content').classList.remove('hidden');}catch(e){console.error(e);}}init();</script></body></html>
