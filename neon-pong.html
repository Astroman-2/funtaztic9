<!DOCTYPE html>
<html><head><title>F9 | Neon Pong</title><script src='https://cdn.tailwindcss.com'></script><script src='https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js'></script><style>body{background:#050505;color:#d4af37;font-family:sans-serif;overflow:hidden;}canvas{border:1px solid #1a1a1a;display:block;margin:auto;}</style></head><body><div class='p-4 flex justify-between text-[10px] uppercase'><span>F9 // Neon Pong</span><span id='my-id'>ID: ...</span></div><canvas id='pong'></canvas><script>const canvas=document.getElementById('pong');const ctx=canvas.getContext('2d');canvas.width=800;canvas.height=400;const peer=new Peer();let conn;peer.on('open',id=>document.getElementById('my-id').innerText='ID: '+id);peer.on('connection',c=>{conn=c;setup();});const p1={y:150,s:0},p2={y:150},ball={x:400,y:200,vx:5,vy:5};function draw(){ctx.fillStyle='#050505';ctx.fillRect(0,0,800,400);ctx.fillStyle='#d4af37';ctx.fillRect(20,p1.y,10,80);ctx.fillRect(770,p2.y,10,80);ctx.beginPath();ctx.arc(ball.x,ball.y,8,0,Math.PI*2);ctx.fill();ball.x+=ball.vx;ball.y+=ball.vy;if(ball.y<0||ball.y>400)ball.vy*=-1;if(ball.x<0||ball.x>800){ball.x=400;ball.vx*=-1;}if(conn && conn.open)conn.send({y:p1.y,b:ball});requestAnimationFrame(draw);}window.addEventListener('mousemove',e=>p1.y=e.clientY-40);function setup(){conn.on('data',d=>{p2.y=d.y;if(!conn.isHost)Object.assign(ball,d.b);});}draw();</script></body></html>
