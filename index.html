<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><script src='https://cdn.tailwindcss.com'></script><style>body{background:#050505; color:white; font-family:sans-serif;}.glass{background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); transition:0.3s;}.glass:hover{background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.2); transform: translateY(-2px);}</style></head><body class='p-8 md:p-20'><div class='max-w-6xl mx-auto'><div class='flex justify-between items-end mb-12'><div id='header-text'><h1 class='text-7xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600 uppercase'>Funtaztic9</h1><p class='text-gray-500 tracking-widest'>DYNAMIC CONTENT ECOSYSTEM • GITHUB PAGES NATIVE</p></div><button onclick='renderGrid()' class='px-8 py-3 bg-white text-black font-bold rounded-full hover:bg-pink-500 hover:text-white transition-all shadow-xl'>RANDOMIZE ECOSYSTEM</button></div><div class='grid grid-cols-1 md:grid-cols-3 gap-8' id='main-grid'></div></div><script>const baseCategories={blogs:['Quantum','Cyber','BioTech','Future','Ethics','DeepSea','Mars','Neural','Neon','Void'],photos:['Nebula','Urban','Minimal','Wild','Macro','Vogue','Arch','Space','Peak','Abyss'],quotes:['Zen','Stoic','Warrior','Thinker','Visionary','Legend','Aura','Myth','Spark','Core']};function renderGrid(){const grid=document.getElementById('main-grid');grid.innerHTML='';Object.keys(baseCategories).forEach(cat=>{let section=document.createElement('div');section.innerHTML=`<h2 class='text-2xl font-bold mb-6 border-l-4 border-pink-500 pl-4 uppercase tracking-tighter'>${cat}</h2>`;const items=[...baseCategories[cat]].sort(()=>0.5-Math.random());items.forEach(item=>{let card=document.createElement('a');card.href=`${cat}/${item.toLowerCase()}.html`;card.className='block p-6 mb-4 glass rounded-xl group';card.innerHTML=`<div class='flex justify-between items-center'><span>${item}</span><span class='text-yellow-500 opacity-50 group-hover:opacity-100'>★★★★★</span></div>`;section.appendChild(card);});grid.appendChild(section);});}renderGrid();</script></body></html>
