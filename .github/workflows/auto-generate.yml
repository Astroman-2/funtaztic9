name: Content Autopilot

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate Page
        run: |
          WORD=$(curl -s https://api.apiverve.com/v1/randomwords)
          CATEGORY=$(echo "blogs photos quotes" | tr ' ' '\n' | shuf -n 1)
          FILE_PATH="$CATEGORY/$WORD.html"
          IMAGE_URL="https://source.unsplash.com/featured/?$WORD"
          
          echo "<html><head><title>$WORD</title></head><body style='background:#121212; color:white; font-family:sans-serif;'><h1>$WORD</h1><img src='$IMAGE_URL' style='max-width:100%;'><p>New automated content for $WORD.</p><a href='../index.html'>Back Home</a></body></html>" > $FILE_PATH
          
          # Simple script to update index.html - this is a basic append logic
          python3 update_index.py
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-generated: $WORD"
          git push
